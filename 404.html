<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Spring Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Onest', sans-serif;
      background: #FBEAF0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 48px 32px;
      text-align: center;
    }
    .icon {
      width: 120px;
      height: 120px;
      background: #FBEAF0;
      border-radius: 26px;
      border: 1px solid #F0C8D4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 600;
      color: #1D9E75;
    }
    .title {
      font-size: 18px;
      font-weight: 600;
      color: #222;
    }
    .sub {
      font-size: 14px;
      color: #A06878;
      margin-top: -10px;
    }
    .btn {
      margin-top: 4px;
      display: inline-block;
      padding: 12px 32px;
      background: #1D9E75;
      color: #fff;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      font-family: 'Onest', sans-serif;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">404</div>
    <div class="title">Эта страница еще не выросла</div>
    <div class="sub">Начни сначала</div>
    <a class="btn" href="/spring-tracker/">На главную</a>
  </div>
</body>
</html>
