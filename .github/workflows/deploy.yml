name: Test & Deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  test:
    name: Тесты
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python — статические проверки лендинга
        run: python3 tools/test_landing.py index.html
      - name: Python — статические проверки приложения
        run: python3 tools/test_app.py app.html
      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Юнит-тесты pure.js
        run: node tools/tests/pure.test.js
      - name: Юнит-тесты db.js
        run: node tools/tests/db.test.js
      - name: Установить Playwright
        run: |
          npm init -y
          npm install @playwright/test
          echo "PW_VERSION=$(node -p "require('@playwright/test/package.json').version")" >> $GITHUB_ENV
      - name: Кеш Playwright браузеров
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ env.PW_VERSION }}
      - name: Установить браузер (если нет в кеше)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Запустить локальный сервер
        run: |
          python3 -m http.server 8080 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 2
      - name: Playwright E2E тесты
        run: npx playwright test --config=playwright.config.js
        env:
          TEST_URL: http://localhost:8080
      - name: Остановить сервер
        if: always()
        run: kill $SERVER_PID || true
      - name: Загрузить отчет Playwright при падении
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tools/tests/report/
          retention-days: 7
  deploy:
    name: Деплой
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Stamp version
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          cat > js/version.js <<EOF
          window.APP_VERSION = {
            sha: '${SHA_SHORT}',
            date: '${BUILD_DATE}',
            branch: '${{ github.ref_name }}'
          };
          EOF
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
