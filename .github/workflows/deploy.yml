name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    name: Тесты
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python — статические проверки HTML
        run: python3 tools/test_landing.py index.html

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Установить Playwright
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install chromium --with-deps

      - name: Запустить локальный сервер
        run: |
          python3 -m http.server 8080 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 2

      - name: Playwright E2E тесты
        run: npx playwright test --config=playwright.config.js
        env:
          TEST_URL: http://localhost:8080

      - name: Остановить сервер
        if: always()
        run: kill $SERVER_PID || true

      - name: Загрузить отчет Playwright при падении
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tools/tests/report/
          retention-days: 7

  deploy:
    name: Деплой
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
