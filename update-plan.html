  strength: STRENGTH_DAYS,
  wingchun: WINGCHUN_DAYS,
  qigong: QIGONG_DAYS
};

var status = document.getElementById('status');
var sections = ['strength','wingchun','qigong'];
var promises = sections.map(function(s) {
  return db.collection('plan').doc(s).set({days: plans[s], updatedAt: new Date().toISOString()});
});

Promise.all(promises).then(function() {
  status.className = 'status ok';
  status.textContent = 'Готово! План успешно записан в Firebase. Можешь закрыть страницу.';
}).catch(function(e) {
  status.className = 'status err';
  status.textContent = 'Ошибка: ' + e.message;
});
